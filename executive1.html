<!DOCTYPE html>
<html>
<head>
<title>Resume Builder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    display:flex;
    background:#f2f3f7;
}

/* LEFT PANEL */
.left-panel{
    width:400px;
    background:#fff;
    padding:20px;
    height:100vh;
    overflow-y:auto;
    box-shadow:2px 0 8px rgba(0,0,0,0.05);
}

h2{ margin-bottom:15px; }

/* TABS */
.tabs{
    display:flex;
    background:#4dddf4;
    border-radius:10px;
    overflow:hidden;
    margin-bottom:20px;
}

.tabs button{
    flex:1;
    padding:10px;
    border:none;
    background:none;
    cursor:pointer;
    font-weight:600;
}

.tabs button.active{
    background:rgb(177, 239, 246);
    border-radius:10px;
}

/* INPUTS */
input,textarea{
    width:90%;
    padding:10px;
    margin-bottom:12px;
    border-radius:8px;
    border:1px solid #ddd;
}

textarea{
    resize:none;
    height:100px;
}

/* RIGHT RESUME */
.resume{
    width:185mm;
    height: 260mm;
    background: white;
    margin: 10mm auto;
    display:flex;
    border: 4px solid #4dddf4;
    box-shadow: 0 0 15px rgba(0,0,0,0.08);
    background:white;
}

/* SIDEBAR */
.sidebar{
    width:35%;
    background:linear-gradient(180deg,#2fd6f0,#44e2e2);
    color:white;
    padding:30px 20px;
}

.sidebar img{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    display:block;
    margin:0 auto 20px;
    border:3px solid white;
}

.sidebar h4{
    margin-top:25px;
    font-size:13px;
    letter-spacing:1px;
}

.sidebar p{
    font-size:14px;
    margin:6px 0;
}

/* CONTENT */
.content{
    width:65%;
    padding:40px;
}

.content h1{
    color:#1ec9e3;
    margin:0;
}

.content h3{
    font-size:13px;
    letter-spacing:1px;
    color:#1ec9e3;
    border-bottom:2px solid #eee;
    padding-bottom:6px;
}

.section{
    margin-top:25px;
}

.export-btn{
    position:fixed;
    top:20px;
    right:20px;
    background:#1ec9e3;
    color:white;
    padding:10px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.hidden{ display:none; 
}
.back-btn{
    background:white;
    color:#333;
    border:none;
    padding:8px 16px;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    transition:0.3s;
}

.back-btn:hover{
    background:#f0f0f0;
}
.resume{
    overflow:hidden;
}
</style>
</head>

<body>

<button class="export-btn" onclick="downloadPDF()">Export</button>

<!-- LEFT EDIT PANEL -->
<div class="left-panel">
<div class="top-bar">
        <button onclick="window.location.href='combine2.html'" class="back-btn">Back</button>
    </div>
<h2>Edit Resume</h2>

<div class="tabs">
<button class="active" onclick="showTab('personal',this)">Personal</button>
<button onclick="showTab('skills',this)">Skills</button>
<button onclick="showTab('history',this)">History</button>
</div>

<!-- PERSONAL -->
<div id="personal">
<label><b>Photo</b></label>
<input type="file" accept="image/*" onchange="loadPhoto(event)">
<label><b>Name</b></label>
<input type="text" id="name" value="Meera Lyer" oninput="updateData()">
<label><b>Job Title</b></label>
<input type="text" id="title" value="Backend Developer" oninput="updateData()">
<label><b>Phone</b></label>
<input type="text" id="phone" value="+1 (555) 123-4567" oninput="updateData()">
<label><b>Email</b></label>
<input type="text" id="email" value="meera@gmail.com" oninput="updateData()">
<label><b>Address</b></label>
<input type="text" id="address" value="123 Main Street, CA" oninput="updateData()">
<label><b>Website</b></label>
<input type="text" id="website" value="www.alexmeera.dev" oninput="updateData()">
<label><b>Summary</b></label>
<textarea id="profile" oninput="updateData()">Passionate full-stack developer with 5+ years of experience building scalable web applications.Skilled in React, Node.js, and cloud technologies.</textarea>
</div>

<!-- SKILLS -->
<div id="skills" class="hidden">
    <label><b>Skills</b></label>
<input type="text" id="skill1" value="React & TypeScript" oninput="updateData()">
<input type="text" id="skill2" value="Node.js & Express" oninput="updateData()">
<input type="text" id="skill3" value="MongoDB" oninput="updateData()">
<input type="text" id="skill4" value="AWS & Docker" oninput="updateData()">
<input type="text" id="skill5" value="CI/CD" oninput="updateData()">

<label><b>Languages</b></label><br>
<input type="text" id="lang1" value="English - Native" oninput="updateData()">
<input type="text" id="lang2" value="Spanish - Fluent" oninput="updateData()">
<input type="text" id="lang3" value="French - Intermediate" oninput="updateData()">
</div>

<!-- HISTORY -->
<div id="history" class="hidden">
<label><b>Education</b></label>
<input type="text" id="education1" value="B.Sc. Computer science" oninput="updateData()">
<input type="text" id="education2" value="Stanford University (2016-2020)" oninput="updateData()">
<textarea id="education4" oninput="updateData()">Graduated with honours.Focused on software engineering and distributed systems.</textarea>

<label><b>Experience</b></label>
<input type="text" id="experience1" value="Backend Developer " oninput="updateData()">
<input type="text" id="experience2" value="TechSoft Pvt Ltd |2022-Present " oninput="updateData()">
<textarea id="experience3" oninput="updateData()">Developed server-side logic using Node.js & Express</textarea>
<label><b>Projects</b></label>
<textarea id="project" oninput="updateData()">Resume Builder</textarea>

</div>
</div>

<!-- RESUME PREVIEW -->
<div class="resume" id="resume">
<div class="sidebar">
<img id="photo" src="https://via.placeholder.com/120">
<div></div>
<h3>CONTACT</h3>
<lable><b>Phone</b></lable><span>&#128222</span><p id="r_phone"></p>
<lable><b>Email</b></lable><span>&#9993</span><p id="r_email"></p>
<lable><b>Address</b></lable><span>&#128205</span><p id="r_address"></p>
<lable><b>Website</b></lable><span>&#127760</span><p id="r_website"></p>

<h3>SKILLS</h3>
<p id="r_skill1"></p>
<p id="r_skill2"></p>
<p id="r_skill3"></p>
<p id="r_skill4"></p>
<p id="r_skill5"></p>

<h3>LANGUAGES</h3>
<p id="r_lang1"></p>
<p id="r_lang2"></p>
<p id="r_lang3"></p>
</div>
<div class="content">

<h1 id="r_name"></h1>
<p id="r_title"></p>

<div class="section">
<h3>PROFILE</h3>
<p id="r_profile"></p>
</div>

<div class="section">
<h3>EDUCATION</h3>
<p id="r_education1"></p>
<p id="r_education2"></p>
<p id="r_education4"></p>

</div>

<div class="section">
<h3>EXPERIENCE</h3>
<p id="r_experience1"></p>
<p id="r_experience2"></p>
<p id="r_experience3"></p>
</div>
<div class="section">
<h3>PROJECT </h3>
<p id="r_project"></p>

</div>
</div>
</div>
<script>

function showTab(tab,btn){
["personal","skills","history"].forEach(t=>{
document.getElementById(t).classList.add("hidden");
});
document.getElementById(tab).classList.remove("hidden");

document.querySelectorAll(".tabs button")
.forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
}

function updateData(){
const fields = [
"name","title","phone","email","address","website","profile",
"skill1","skill2","skill3","skill4","skill5",
"lang1","lang2","lang3","project","experience1",
"experience2","experience3","education1","education2","education4"
];

fields.forEach(id=>{
let input=document.getElementById(id);
let preview=document.getElementById("r_"+id);
if(input && preview){
preview.innerText=input.value;
}
});
}

function loadPhoto(event){
const reader=new FileReader();
reader.onload=function(){
document.getElementById("photo").src=reader.result;
}
reader.readAsDataURL(event.target.files[0]);
}

function downloadPDF(){
    const element = document.getElementById("resume");

    const opt = {
        margin: 10,
        filename: 'resume.pdf',
        image: { type: 'jpeg', quality: 1 },
        html2canvas: { scale: 2},
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };

    html2pdf().set(opt).from(element).save();
}

updateData();
</script>
</body>
</html>

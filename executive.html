<script>

function showTab(tab,btn){
["personal","skills","history"].forEach(t=>{
document.getElementById(t).classList.add("hidden");
});
document.getElementById(tab).classList.remove("hidden");

document.querySelectorAll(".tabs button")
.forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
}

function updateData(){

document.querySelectorAll("input,textarea").forEach(input=>{

let preview=document.getElementById("r_"+input.id);

if(preview){
preview.innerText=input.value;
}

});

updateDynamic();
}

function updateDynamic(){
let skillHTML="";

document.querySelectorAll("#skillsContainer input").forEach(input=>{

let box=input.parentElement;
let stars="";
let rating=0;

if(box.querySelector(".stars")){
rating=box.querySelectorAll(".active").length;
}

if(input.value.trim() !== ""){

if(rating>0){

for(let i=1;i<=5;i++){
stars += i<=rating ? "★" : "☆";
}

skillHTML += `
<div class="skill-row">
<span>${input.value}</span>
<span class="star-display">${stars}</span>
</div>
`;

}else{

skillHTML += `
<div class="skill-row">
<span>${input.value}</span>
</div>
`;

}

}

});

document.getElementById("r_skills").innerHTML=skillHTML;
let langHTML="";

document.querySelectorAll("#langContainer input").forEach(input=>{

let box=input.parentElement;
let stars="";
let rating=0;

if(box.querySelector(".stars")){
rating=box.querySelectorAll(".active").length;
}

if(input.value.trim() !== ""){

if(rating>0){

for(let i=1;i<=5;i++){
stars += i<=rating ? "★" : "☆";
}

langHTML += `
<div class="lang-row">
<span>${input.value}</span>
<span class="star-display">${stars}</span>
</div>
`;

}else{

langHTML += `
<div class="lang-row">
<span>${input.value}</span>
</div>
`;

}

}

});

document.getElementById("r_languages").innerHTML=langHTML;
let hobbyHTML = "";

document.querySelectorAll("#hobbyContainer input").forEach(input => {
    if(input.value.trim() !== ""){
        hobbyHTML += `<p>${input.value}</p>`;
    }
});

document.getElementById("r_hobbies").innerHTML = hobbyHTML;
let eduHTML="";
document.querySelectorAll("#eduContainer input,#eduContainer textarea").forEach(i=>{
eduHTML += "<p>"+i.value+"</p>";
});
document.getElementById("r_education").innerHTML=eduHTML;

let expHTML="";
document.querySelectorAll("#expContainer input,#expContainer textarea").forEach(i=>{
expHTML += "<p>"+i.value+"</p>";
});
document.getElementById("r_experience").innerHTML=expHTML;

let projHTML="";
document.querySelectorAll("#projContainer input,#projContainer textarea").forEach(i=>{
projHTML += "<p>"+i.value+"</p>";
});
document.getElementById("r_projects").innerHTML=projHTML;

}

function loadPhoto(event){
const reader=new FileReader();
reader.onload=function(){
document.getElementById("photo").src=reader.result;
}
reader.readAsDataURL(event.target.files[0]);
}

function downloadPDF(){
    const element = document.getElementById("resume");
    const password = localStorage.getItem("resumePassword");

    if(!password){
        alert("Password not found!");
        return;
    }

    const opt = {
        margin: 10,
        filename: 'resume.pdf',
        image: { type: 'jpeg', quality: 1 },
        html2canvas: { scale: 2 },
        jsPDF: { 
            unit: 'mm', 
            format: 'a4', 
            orientation: 'portrait',
            encryption: {
                userPassword: password,   // 👈 THIS IS IMPORTANT
                ownerPassword: password,
                userPermissions: ["print", "copy"]
            }
        }
    };

    html2pdf().set(opt).from(element).save();
}


updateData();

star.innerHTML="★";

star.onclick=function(){
setRating(star,i);

stars.appendChild(star);
}

let del=document.createElement("button");
del.innerText="Delete";
del.style.marginLeft="5px";

del.onclick=function(){

updateData();
}

wrapper.appendChild(input);
wrapper.appendChild(stars);
wrapper.appendChild(del);

document.getElementById("skillsContainer").appendChild(wrapper);

updateData();

}

function setRating(el,rating){

let stars = el.parentElement.querySelectorAll("span");

stars.forEach((star,index)=>{

function showPasswordPopup(){
    document.getElementById("passwordPopup").style.display = "flex";

    // Auto-fill name from resume
    document.getElementById("userName").value = document.getElementById("name").value;
}

function generatePassword(){
    var name = document.getElementById("userName").value.trim();
    var dob = document.getElementById("userDOB").value;

    if(name.length < 4 || !dob){
        alert("Enter valid name and DOB");
        return;
    }

    var namePart = name.substring(0,4).toUpperCase();

    var date = new Date(dob);
    var day = ("0" + date.getDate()).slice(-2);
    var month = ("0" + (date.getMonth()+1)).slice(-2);

    var password = namePart + day + month;

    document.getElementById("generatedPassword").innerText = "Password: " + password;

    localStorage.setItem("resumePassword", password);
}

function finalDownload(){
    var password = localStorage.getItem("resumePassword");

    if(!password){
        alert("Generate password first!");
        return;
    }

    alert("Resume Downloaded!\nPassword: " + password);

    // CALL YOUR EXISTING PDF FUNCTION
    downloadPDF();

    document.getElementById("passwordPopup").style.display = "none";
}
